<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazaaro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Bazaaro</h1>
<p class="tagline">Don't compare. Just decide.</p>

<div class="search-box">
<input id="query" placeholder="Search product (e.g. best earbuds under 2000)" />
<button onclick="search()">Search</button>
</div>

<div id="result"></div>
</div>

<script>
async function search() {
 const q = document.getElementById("query").value;
 document.getElementById("result").innerHTML = "Thinking...";

 const res = await fetch(https://merabazar-5w4l.onrender.com);
 const data = await res.json();

 document.getElementById("result").innerHTML = `
 <div class="card">
 <h2>${data.title}</h2>
 <p><strong>Best Pick:</strong> ${data.best}</p>
 <p><strong>Why:</strong> ${data.reason}</p>
 <p><strong>Price:</strong> ${data.price}</p>
 <a href="${data.link}" target="_blank">Buy Now</a>
 </div>
 `;
}
</script>

</body>
</html>
